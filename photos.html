<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Photos — Emil Bories Hüttel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #FFFFFF;
      --sans: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    body {
      background: var(--white);
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      font-family: var(--sans);
    }

    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 1.2s ease;
    }

    .slide.active { opacity: 1; }

    .slide img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
    }

    .back {
      position: fixed;
      top: 1.1rem;
      left: 1.4rem;
      font-size: 0.6rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #444;
      text-decoration: none;
      z-index: 10;
      transition: color 0.15s;
    }

    .back:hover { color: #888; }

    .counter {
      position: fixed;
      bottom: 1.1rem;
      right: 1.4rem;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: #333;
      z-index: 10;
    }
  </style>
</head>
<body>

  <a href="index.html" class="back">← Emil Bories Hüttel</a>
  <span class="counter" id="counter"></span>

  <!-- ─────────────────────────────────────────
       Add your images below.
       Put your image files in a photos/ folder
       and add one <div class="slide"> per image.
       ───────────────────────────────────────── -->
  <div class="slide"><img src="photos/01.jpeg" alt=""></div>
  <div class="slide"><img src="photos/02.jpeg" alt=""></div>
  <div class="slide"><img src="photos/03.jpeg" alt=""></div>
  <div class="slide"><img src="photos/04.jpeg" alt=""></div>
  <div class="slide"><img src="photos/05.jpeg" alt=""></div>
  <div class="slide"><img src="photos/06.jpeg" alt=""></div>
  <div class="slide"><img src="photos/07.jpeg" alt=""></div>
  <div class="slide"><img src="photos/08.jpeg" alt=""></div>
  <div class="slide"><img src="photos/09.jpeg" alt=""></div>
  <div class="slide"><img src="photos/10.jpeg" alt=""></div>
  <div class="slide"><img src="photos/11.jpeg" alt=""></div>
  <div class="slide"><img src="photos/12.jpeg" alt=""></div>
  <div class="slide"><img src="photos/13.jpeg" alt=""></div>
  <div class="slide"><img src="photos/14.jpeg" alt=""></div>
  <div class="slide"><img src="photos/15.jpeg" alt=""></div>
  <div class="slide"><img src="photos/16.jpeg" alt=""></div>

  <script>
  const slides = document.querySelectorAll('.slide');
  const counter = document.getElementById('counter');
  const delay = 5000;

  let order = [...Array(slides.length).keys()];
  order.sort(() => Math.random() - 0.5);
  let i = 0;

  function show(index) {
    slides.forEach(s => s.classList.remove('active'));
    slides[order[index]].classList.add('active');
    counter.textContent = (index + 1) + ' / ' + slides.length;
  }

  function next() {
    i = (i + 1) % order.length;
    show(i);
    resetTimer();
  }

  let timer = setInterval(next, delay);

  function resetTimer() {
    clearInterval(timer);
    timer = setInterval(next, delay);
  }

  document.body.addEventListener('click', next);

  show(0);
</script>

</body>
</html>
